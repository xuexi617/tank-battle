<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Press Start 2P', monospace;
  flex-direction: column; user-select: none;
}
.game-wrapper {
  background: #222; padding: 20px; border-radius: 8px;
  box-shadow: 0 0 40px rgba(255,200,0,0.15), inset 0 0 20px rgba(0,0,0,0.5);
  border: 3px solid #444;
}
canvas {
  display: block; margin: 0 auto;
  image-rendering: pixelated;
  width: 520px; height: 520px;
}
.hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; color: #ffd700;
  font-size: 11px; letter-spacing: 1px;
}
.hud-left, .hud-right { display: flex; align-items: center; gap: 16px; }
.canvas-container { position: relative; }
.overlay {
  position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; background: rgba(0,0,0,0.8);
  color: #fff; gap: 12px;
}
.overlay h1 { color: #ffd700; font-size: 28px; text-shadow: 3px 3px 0 #8b6914; }
.overlay p { color: #ccc; font-size: 12px; text-align: center; padding: 0 16px; }
.btn {
  background: #ffd700; color: #222; border: none;
  padding: 10px 30px; font-size: 14px; cursor: pointer;
  border-radius: 4px; font-family: inherit;
  box-shadow: 0 3px 0 #8b6914;
}
.btn:hover { background: #ffe44d; }
.btn:active { transform: translateY(3px); box-shadow: none; }
.lives { color: #ff6b6b; }
.stage { color: #4ecdc4; }
.info {
  color: #aaa; font-size: 10px; text-align: center; margin-top: 12px;
}
.info kbd {
  background: #333; color: #ffd700; padding: 2px 8px;
  border-radius: 3px; border: 1px solid #555; font-size: 10px;
}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="hud">
    <div class="hud-left">
      <span class="stage">STAGE <span id="stageDisplay">1</span></span>
    </div>
    <div class="hud-right">
      <span>SCORE: <span id="scoreDisplay">0</span></span>
      <span class="lives">&#9829; <span id="livesDisplay">3</span></span>
      <span>ENEMIES: <span id="enemiesDisplay">20</span></span>
    </div>
  </div>
  <div class="canvas-container">
    <canvas id="gameCanvas" width="416" height="416"></canvas>
    <div class="overlay" id="overlay">
      <h1>&#9733; 坦克大战 &#9733;</h1>
      <p>BATTLE CITY</p>
      <p style="font-size:10px;color:#999;">方向键移动 &nbsp;|&nbsp; 空格射击</p>
      <button class="btn" id="startBtn">开 始 游 戏</button>
    </div>
  </div>
  <div class="info">
    <kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&rarr;</kbd> <kbd>&darr;</kbd> 移动
    &nbsp;&nbsp; <kbd>SPACE</kbd> 射击
    &nbsp;&nbsp; <kbd>P</kbd> 暂停
  </div>
</div>

<script>
(function(){
'use strict';

// ── Canvas ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── DOM refs ──
const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('startBtn');
const scoreD     = document.getElementById('scoreDisplay');
const stageD     = document.getElementById('stageDisplay');
const livesD     = document.getElementById('livesDisplay');
const enemiesD   = document.getElementById('enemiesDisplay');

// ── Constants ──
const TILE = 16, COLS = 26, ROWS = 26;
const W = COLS * TILE, H = ROWS * TILE;
const PLAYER_SPEED = 1.5;
const BULLET_SPEED = 3;
const ENEMY_SPEED  = 0.7;
const DIR = { UP:0, RIGHT:1, DOWN:2, LEFT:3 };

// ── Game state ──
let G = {};

function initState() {
  return {
    stage:1, score:0, lives:3, gameOver:false, paused:false,
    running:false, enemiesTotal:20, enemiesSpawned:0, enemiesKilled:0,
    spawnTimer:0, maxEnemies:4,
    player:null, enemies:[], bullets:[], tiles:[],
    particles:[], explosions:[], frame:0,
    keys:{}, baseAlive:true, enemySpawnCooldown:0,
  };
}

// ── Seeded RNG (deterministic maps) ──
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Map generator ──
function createStageMap(stage) {
  const map = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  const rng = mulberry32(stage * 9999 + 42);

  // Steel border
  for (let x = 0; x < COLS; x++) {
    map[0][x] = 2;
    if (x < 11 || x > 14) map[ROWS-1][x] = 2;
  }
  for (let y = 0; y < ROWS; y++) {
    map[y][0] = 2;
    map[y][COLS-1] = 2;
  }

  // Base (eagle) — bottom center
  map[ROWS-1][12]=3; map[ROWS-1][13]=3;
  map[ROWS-2][12]=3; map[ROWS-2][13]=3;

  // Brick layout
  for (let y = 2; y < ROWS-3; y++) {
    for (let x = 1; x < COLS-1; x++) {
      if (y >= ROWS-4 && x >= 11 && x <= 14) continue; // protect base
      if (y < 3 && (x < 4 || x > COLS-5)) continue;    // spawn zones
      if (y >= ROWS-5 && (x < 4 || x > COLS-5)) continue;
      if (rng() < 0.35) map[y][x] = 1;
    }
  }

  // Clear spawn points
  const spawns = [[0,0],[0,COLS-3],[ROWS-3,0],[ROWS-3,COLS-3]];
  for (const [sy,sx] of spawns) {
    for (let dy=0; dy<3; dy++) for (let dx=0; dx<3; dx++) map[sy+dy][sx+dx] = 0;
  }

  // Player spawn area (clear 3x3 block)
  const px=8, py=ROWS-4;
  for (let dy=0; dy<3; dy++) for (let dx=0; dx<4; dx++) map[py+dy][px+dx] = 0;

  // Steel blocks at higher stages
  if (stage >= 3) {
    const n = 2 + stage;
    for (let i = 0; i < n; i++) {
      let y = 3 + Math.floor(rng() * (ROWS-8));
      let x = 3 + Math.floor(rng() * (COLS-6));
      map[y][x] = 2;
    }
  }

  return map;
}

// ── Tile ──
class Tile {
  constructor(col, row, type) {
    this.x = col * TILE; this.y = row * TILE;
    this.w = TILE; this.h = TILE;
    this.type = type; // 1=brick, 2=steel, 3=base
    this.alive = true;
  }
  draw() {
    if (!this.alive) return;
    const {x,y} = this;
    if (this.type === 1) { // brick
      ctx.fillStyle = '#b35e30'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#7a3e1e';
      ctx.fillRect(x+7,y,1,TILE); ctx.fillRect(x,y+7,TILE,1);
      ctx.fillStyle = '#d4733e';
      for (let r=0; r<2; r++) for (let c=0; c<2; c++)
        ctx.fillRect(x+1+c*8+r*4, y+1+r*8+c*4, 5,5);
    } else if (this.type === 2) { // steel
      ctx.fillStyle = '#999'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#666';
      ctx.fillRect(x+2,y+2,5,5); ctx.fillRect(x+9,y+2,5,5);
      ctx.fillRect(x+2,y+9,5,5); ctx.fillRect(x+9,y+9,5,5);
      ctx.fillStyle = '#ccc';
      ctx.fillRect(x+4,y+4,2,2); ctx.fillRect(x+11,y+4,2,2);
      ctx.fillRect(x+4,y+11,2,2); ctx.fillRect(x+11,y+11,2,2);
      ctx.fillStyle = '#666';
      ctx.fillRect(x+7,y,1,TILE); ctx.fillRect(x,y+7,TILE,1);
    } else if (this.type === 3) { // base
      ctx.fillStyle = '#555';
      ctx.fillRect(x+2,y+6,12,8); ctx.fillRect(x+4,y+4,8,2); ctx.fillRect(x+6,y+2,4,2);
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x+6,y+1,4,3);
      ctx.fillStyle = '#fff';    ctx.fillRect(x+7,y+2,2,1);
      ctx.fillStyle = '#f39c12'; ctx.fillRect(x+4,y+8,8,4);
      ctx.fillStyle = '#ffd700'; ctx.fillRect(x+6,y+9,4,2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x+4,y+7,2,2); ctx.fillRect(x+10,y+7,2,2);
      ctx.fillStyle = '#222';
      ctx.fillRect(x+5,y+8,1,1); ctx.fillRect(x+11,y+8,1,1);
    }
  }
}

// ── Bullet ──
class Bullet {
  constructor(x,y,dir,isPlayer) {
    this.x=x; this.y=y; this.dir=dir; this.isPlayer=isPlayer;
    this.speed=BULLET_SPEED; this.alive=true; this.w=4; this.h=4;
  }
  update() {
    const dx = this.dir===1 ? this.speed : this.dir===3 ? -this.speed : 0;
    const dy = this.dir===0 ? -this.speed : this.dir===2 ? this.speed : 0;
    this.x += dx; this.y += dy;

    if (this.x < -4 || this.x > W+4 || this.y < -4 || this.y > H+4) {
      this.alive = false; return;
    }

    // Tile collision
    for (const t of G.tiles) {
      if (!t.alive) continue;
      if (this.x < t.x+t.w && this.x+this.w > t.x &&
          this.y < t.y+t.h && this.y+this.h > t.y) {
        if (t.type === 1) {
          t.alive = false;
          explode(t.x+8,t.y+8,4,'#b35e30','#ff8844');
          this.alive = false;
        } else if (t.type === 2) {
          explode(this.x+2,this.y+2,3,'#aaa','#fff');
          this.alive = false;
        } else if (t.type === 3) {
          t.alive = false;
          G.baseAlive = false;
          explode(t.x+8,t.y+8,20,'#ff4444','#ffdd00');
          this.alive = false;
        }
        return;
      }
    }

    if (this.isPlayer) {
      for (const e of G.enemies) {
        if (!e.alive) continue;
        if (this.x < e.x+e.w && this.x+this.w > e.x &&
            this.y < e.y+e.h && this.y+this.h > e.y) {
          e.hit();
          this.alive = false;
          return;
        }
      }
    } else if (G.player && G.player.alive) {
      if (this.x < G.player.x+G.player.w && this.x+this.w > G.player.x &&
          this.y < G.player.y+G.player.h && this.y+this.h > G.player.y) {
        G.player.hit();
        this.alive = false;
      }
    }
  }
  draw() {
    if (!this.alive) return;
    ctx.fillStyle = this.isPlayer ? '#ffe066' : '#ff6b6b';
    ctx.fillRect(this.x,this.y,this.w,this.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x+1,this.y+1,2,2);
  }
}

// ── Tank base ──
class Tank {
  constructor(x,y,dir,isPlayer) {
    this.x=x;this.y=y;this.w=16;this.h=16;this.dir=dir;
    this.isPlayer=isPlayer;this.alive=true;
    this.speed=isPlayer?PLAYER_SPEED:ENEMY_SPEED;
    this.cooldown=0;this.hp=1;
  }
  get cx(){return this.x+8} get cy(){return this.y+8}

  canMove(nx,ny) {
    if (nx<0||nx+this.w>W||ny<0||ny+this.h>H) return false;
    for (const t of G.tiles) {
      if (!t.alive) continue;
      if (nx<t.x+t.w&&nx+this.w>t.x&&ny<t.y+t.h&&ny+this.h>t.y) return false;
    }
    for (const e of G.enemies) {
      if (e===this||!e.alive) continue;
      if (nx<e.x+e.w&&nx+this.w>e.x&&ny<e.y+e.h&&ny+this.h>e.y) return false;
    }
    if (G.player&&G.player.alive&&G.player!==this) {
      if (nx<G.player.x+G.player.w&&nx+this.w>G.player.x&&
          ny<G.player.y+G.player.h&&ny+this.h>G.player.y) return false;
    }
    return true;
  }

  move(dir) {
    this.dir=dir;
    let nx=this.x,ny=this.y;
    switch(dir){
      case 0:ny-=this.speed;break;
      case 1:nx+=this.speed;break;
      case 2:ny+=this.speed;break;
      case 3:nx-=this.speed;break;
    }
    // Snap to grid for smooth cornering
    if (dir===0||dir===2) nx=Math.round(nx/2)*2;
    if (dir===1||dir===3) ny=Math.round(ny/2)*2;

    if (!this.canMove(nx,ny)) return;
    // Alignment correction — snap to 16px grid when near
    if (dir===0||dir===2) {
      const align=Math.abs(nx%16);
      if (align<3) nx=Math.floor(nx/16)*16;
      else if (align>13) nx=Math.ceil(nx/16)*16;
      if (!this.canMove(nx,ny)) return;
    } else {
      const align=Math.abs(ny%16);
      if (align<3) ny=Math.floor(ny/16)*16;
      else if (align>13) ny=Math.ceil(ny/16)*16;
      if (!this.canMove(nx,ny)) return;
    }
    this.x=nx;this.y=ny;
  }

  shoot() {
    if (this.cooldown>0) return null;
    this.cooldown=this.isPlayer?12:30;
    let bx=this.x+6,by=this.y+6;
    switch(this.dir){
      case 0:bx=this.x+6;by=this.y-4;break;
      case 1:bx=this.x+16;by=this.y+6;break;
      case 2:bx=this.x+6;by=this.y+16;break;
      case 3:bx=this.x-4;by=this.y+6;break;
    }
    const b=new Bullet(bx,by,this.dir,this.isPlayer);
    G.bullets.push(b);
    return b;
  }

  hit() {
    this.hp--;
    if (this.hp<=0) {
      this.alive=false;
      explode(this.cx,this.cy,10,'#ff8800','#ffdd00');
    }
  }
}

// ── Player ──
class PlayerTank extends Tank {
  constructor(x,y) {
    super(x,y,DIR.UP,true);
    this.invincible=0;this.respawnDelay=0;
    this.maxCooldown=12;
  }
  hit() {
    if (this.invincible>0) return;
    super.hit();
    G.lives--;
    updateHUD();
    if (G.lives<=0||!this.alive) {
      endGame();
    } else {
      this.respawnDelay=90;
    }
  }
  respawn() {
    this.x=8*TILE;this.y=(ROWS-3)*TILE;
    this.dir=DIR.UP;this.alive=true;this.hp=1;
    this.invincible=120;this.cooldown=0;
    explode(this.cx,this.cy,8,'#4ecdc4','#fff');
  }
  draw() {
    if (!this.alive) return;
    const {x,y,dir}=this;
    if (this.invincible>0&&(G.frame>>2)%2===0) {
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(x,y,16,16);
    }
    // Golden player tank
    ctx.fillStyle='#ffd700';
    ctx.fillRect(x+1,y+3,14,10);
    // Treads
    ctx.fillStyle='#b89b00';
    ctx.fillRect(x,y+2,3,12);ctx.fillRect(x+13,y+2,3,12);
    ctx.fillStyle='#ffd700';
    for(let i=0;i<4;i++){ctx.fillRect(x,y+4+i*3,3,1);ctx.fillRect(x+13,y+4+i*3,3,1);}
    // Turret
    ctx.fillStyle='#b89b00';
    if(dir===0){ctx.fillRect(x+4,y,8,8);ctx.fillRect(x+6,y-2,4,4);}
    else if(dir===1){ctx.fillRect(x+8,y+4,8,8);ctx.fillRect(x+14,y+6,4,4);}
    else if(dir===2){ctx.fillRect(x+4,y+8,8,8);ctx.fillRect(x+6,y+14,4,4);}
    else if(dir===3){ctx.fillRect(x,y+4,8,8);ctx.fillRect(x-2,y+6,4,4);}
    // Barrel
    ctx.fillStyle='#ffd700';
    if(dir===0)ctx.fillRect(x+6,y-4,4,6);
    else if(dir===1)ctx.fillRect(x+14,y+6,6,4);
    else if(dir===2)ctx.fillRect(x+6,y+14,4,6);
    else if(dir===3)ctx.fillRect(x-4,y+6,6,4);
    // Detail
    ctx.fillStyle='#fff';
    if(dir===0)ctx.fillRect(x+7,y+3,2,2);
    else if(dir===1)ctx.fillRect(x+10,y+7,2,2);
    else if(dir===2)ctx.fillRect(x+7,y+11,2,2);
    else if(dir===3)ctx.fillRect(x+4,y+7,2,2);
  }
}

// ── Enemy ──
const ENEMY_COLORS = [
  {main:'#c0392b',dark:'#7a1f1a'},
  {main:'#e67e22',dark:'#a8590a'},
  {main:'#bdc3c7',dark:'#7f8c8d'},
];
class EnemyTank extends Tank {
  constructor(x,y,type) {
    super(x,y,DIR.DOWN,false);
    this.type=type; // 0=basic,1=fast,2=armor
    this.speed=type===1?1.0:type===0?0.65:0.5;
    this.hp=type===2?3:1;
    this.maxHp=this.hp;
    this.dirChange=0;
    this.shootTimer=30+Math.floor(Math.random()*60);
    this.spawnFlash=40;
  }
  update() {
    if (this.spawnFlash>0){this.spawnFlash--;return;}
    if (!this.alive) return;
    if (this.cooldown>0) this.cooldown--;

    // AI
    this.dirChange--;
    if (this.dirChange<=0) {
      if (G.player&&G.player.alive) {
        const dx=G.player.cx-this.cx, dy=G.player.cy-this.cy;
        const r=Math.random();
        if (r<0.35) this.dir=Math.abs(dy)>Math.abs(dx)?(dy>0?2:0):(dx>0?1:3);
        else if (r<0.6) this.dir=Math.floor(Math.random()*4);
        // else keep dir
      } else this.dir=Math.floor(Math.random()*4);
      this.dirChange=30+Math.floor(Math.random()*80);
    }
    this.move(this.dir);

    this.shootTimer--;
    if (this.shootTimer<=0) {
      this.shoot();
      this.shootTimer=50+Math.floor(Math.random()*90);
    }
  }
  draw() {
    if (!this.alive) return;
    const {x,y,dir}=this;
    if (this.spawnFlash>0) {
      ctx.fillStyle=this.spawnFlash%6<3?'#fff':'#ffd700';
      ctx.fillRect(x,y,16,16); return;
    }
    const c=ENEMY_COLORS[this.type]||ENEMY_COLORS[0];
    ctx.fillStyle=c.main; ctx.fillRect(x+1,y+3,14,10);
    ctx.fillStyle=c.dark;
    ctx.fillRect(x,y+2,3,12);ctx.fillRect(x+13,y+2,3,12);
    ctx.fillStyle=c.main;
    for(let i=0;i<4;i++){ctx.fillRect(x,y+4+i*3,3,1);ctx.fillRect(x+13,y+4+i*3,3,1);}
    ctx.fillStyle=c.dark;
    if(dir===0){ctx.fillRect(x+5,y,6,7);ctx.fillRect(x+6,y-2,4,4);}
    else if(dir===1){ctx.fillRect(x+9,y+5,7,6);ctx.fillRect(x+14,y+6,4,4);}
    else if(dir===2){ctx.fillRect(x+5,y+9,6,7);ctx.fillRect(x+6,y+14,4,4);}
    else if(dir===3){ctx.fillRect(x,y+5,7,6);ctx.fillRect(x-2,y+6,4,4);}
    ctx.fillStyle=c.main;
    if(dir===0)ctx.fillRect(x+6,y-3,4,5);
    else if(dir===1)ctx.fillRect(x+14,y+6,5,4);
    else if(dir===2)ctx.fillRect(x+6,y+14,4,5);
    else if(dir===3)ctx.fillRect(x-3,y+6,5,4);
    // HP bar
    if(this.maxHp>1){
      ctx.fillStyle='#333';ctx.fillRect(x+2,y-3,12,3);
      ctx.fillStyle='#2ecc71';
      ctx.fillRect(x+3,y-2,Math.max(0,(this.hp/this.maxHp)*10),1);
    }
    // Eye
    ctx.fillStyle='#fff';
    if(dir===0)ctx.fillRect(x+7,y+3,2,2);
    else if(dir===1)ctx.fillRect(x+10,y+7,2,2);
    else if(dir===2)ctx.fillRect(x+7,y+11,2,2);
    else if(dir===3)ctx.fillRect(x+4,y+7,2,2);
    ctx.fillStyle='#e74c3c';
    if(dir===0)ctx.fillRect(x+8,y+3,1,1);
    else if(dir===1)ctx.fillRect(x+11,y+7,1,1);
    else if(dir===2)ctx.fillRect(x+8,y+11,1,1);
    else if(dir===3)ctx.fillRect(x+5,y+7,1,1);
  }
}

// ── Effects ──
function explode(x,y,count,c1,c2){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=0.5+Math.random()*2;
    G.particles.push({
      x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:15+Math.random()*25,maxLife:40,
      size:2+Math.floor(Math.random()*4),
      color:Math.random()>0.5?c1:c2,
    });
  }
  G.explosions.push({x,y,radius:count*1.5,life:10,maxLife:10});
}
function updateEffects(){
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;
    if(p.life<=0)G.particles.splice(i,1);
  }
  for(let i=G.explosions.length-1;i>=0;i--){
    if(--G.explosions[i].life<=0)G.explosions.splice(i,1);
  }
}
function drawEffects(){
  for(const p of G.particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  for(const e of G.explosions){
    const a=e.life/e.maxLife;
    ctx.globalAlpha=a*0.5;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(e.x,e.y,e.radius*(1-a*0.5),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e.x,e.y,e.radius*(1-a)*0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Spawning ──
const SPAWN_PTS = [
  {x:1*TILE,y:1*TILE},
  {x:12*TILE,y:1*TILE},
  {x:(COLS-3)*TILE,y:1*TILE},
];

function spawnEnemy(){
  const pool=[...SPAWN_PTS].sort(()=>Math.random()-0.5);
  for(const sp of pool){
    let blocked=false;
    for(const e of G.enemies){
      if(!e.alive)continue;
      if(Math.abs(e.x-sp.x)<24&&Math.abs(e.y-sp.y)<24){blocked=true;break;}
    }
    if(G.player&&G.player.alive&&
       Math.abs(G.player.x-sp.x)<24&&Math.abs(G.player.y-sp.y)<24) blocked=true;
    if(blocked)continue;
    const r=Math.random();
    const type=r<0.15?2:(r<0.4?1:0);
    const e=new EnemyTank(sp.x,sp.y,type);
    G.enemies.push(e);
    G.enemiesSpawned++;
    updateHUD();
    return;
  }
}

// ── HUD ──
function updateHUD(){
  scoreD.textContent=G.score;
  stageD.textContent=G.stage;
  livesD.textContent=G.lives;
  enemiesD.textContent=Math.max(0,G.enemiesTotal-G.enemiesKilled);
}

// ── Game flow ──
function endGame(){
  G.gameOver=true;G.running=false;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>GAME OVER</h1>
    <p>最终得分: ${G.score}</p>
    <p>到达关卡: ${G.stage}</p>
    <button class="btn" id="restartBtn">重新开始</button>
  `;
  document.getElementById('restartBtn').onclick=()=>{overlay.style.display='none';startGame();};
}

function nextStage(){
  G.stage++;
  G.running=false;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>STAGE ${G.stage}</h1>
    <p>准备进入下一关!</p>
    <button class="btn" id="nextBtn">继续</button>
  `;
  document.getElementById('nextBtn').onclick=()=>{overlay.style.display='none';startStage(G.stage);};
}

function startGame(){G=initState();startStage(1);}

function startStage(stage){
  G.stage=stage;
  G.enemiesTotal=20+(stage-1)*5;
  G.enemiesSpawned=0;G.enemiesKilled=0;
  G.running=true;G.baseAlive=true;
  G.enemies=[];G.bullets=[];G.tiles=[];G.spawnTimer=0;

  const map=createStageMap(stage);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    if(map[r][c]>=1&&map[r][c]<=3) G.tiles.push(new Tile(c,r,map[r][c]));

  G.player=new PlayerTank(8*TILE,(ROWS-3)*TILE);
  G.player.invincible=120;
  updateHUD();
  overlay.style.display='none';
}

// ── Input ──
document.addEventListener('keydown',e=>{
  G.keys[e.key]=true;
  if(' ArrowUp ArrowDown ArrowLeft ArrowRight  '.includes(' '+e.key+' ')) e.preventDefault();
});
document.addEventListener('keyup',e=>{
  G.keys[e.key]=false;
  if(' ArrowUp ArrowDown ArrowLeft ArrowRight  '.includes(' '+e.key+' ')) e.preventDefault();
});

// ── Game loop ──
function update(){
  if(!G.running||G.gameOver||G.paused) return;
  G.frame++;

  // Player
  if(G.player&&G.player.alive){
    if(G.player.invincible>0)G.player.invincible--;
    if(G.player.cooldown>0)G.player.cooldown--;
    if(G.keys['ArrowUp'])G.player.move(DIR.UP);
    else if(G.keys['ArrowDown'])G.player.move(DIR.DOWN);
    else if(G.keys['ArrowLeft'])G.player.move(DIR.LEFT);
    else if(G.keys['ArrowRight'])G.player.move(DIR.RIGHT);
    if(G.keys[' ']||G.keys['Space']) G.player.shoot();
  } else if(G.player&&!G.player.alive&&G.player.respawnDelay>0){
    if(--G.player.respawnDelay<=0&&G.lives>0) G.player.respawn();
  }

  // Spawn enemies
  if(G.enemiesSpawned<G.enemiesTotal){
    const alive=G.enemies.filter(e=>e.alive).length;
    if(alive<G.maxEnemies){
      G.spawnTimer--;
      if(G.spawnTimer<=0){spawnEnemy();G.spawnTimer=90;}
    }
  }

  for(const e of G.enemies) e.update();
  for(const b of G.bullets) b.update();

  // Cleanup + score
  const before=G.enemies.length;
  G.bullets=G.bullets.filter(b=>b.alive);
  G.enemies=G.enemies.filter(e=>{
    if(e.alive||e.spawnFlash>0) return true;
    if(!e.isPlayer){
      G.enemiesKilled++;
      G.score+=e.type===2?300:e.type===1?200:100;
      updateHUD();
    }
    return false;
  });

  updateEffects();

  // Win check
  if(G.enemiesKilled>=G.enemiesTotal&&G.enemies.filter(e=>e.alive).length===0){
    nextStage();return;
  }
  if(!G.baseAlive) endGame();
}

function draw(){
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*TILE,0);ctx.lineTo(x*TILE,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*TILE);ctx.lineTo(W,y*TILE);ctx.stroke();}

  for(const t of G.tiles) t.draw();
  if(G.player) G.player.draw();
  for(const e of G.enemies) e.draw();
  for(const b of G.bullets) b.draw();
  drawEffects();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}

// ── Init ──
startBtn.addEventListener('click',()=>{overlay.style.display='none';startGame();});
gameLoop();

})();
</script>
