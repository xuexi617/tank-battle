<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Courier New',monospace;flex-direction:column;user-select:none
}
.game-wrapper{background:#222;padding:16px;border-radius:6px;border:2px solid #444;box-shadow:0 0 30px rgba(255,200,0,.15)}
canvas{display:block;width:520px;height:520px;image-rendering:pixelated}
.hud{display:flex;justify-content:space-between;padding:8px 0;color:#ffd700;font-size:11px;letter-spacing:1px}
.hud-l,.hud-r{display:flex;align-items:center;gap:14px}
.cwrap{position:relative}
.overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(0,0,0,.85);color:#fff;gap:10px
}
.overlay h1{color:#ffd700;font-size:26px}
.overlay p{color:#aaa;font-size:11px}
.btn{
  background:#ffd700;color:#222;border:none;padding:10px 28px;font-size:13px;
  cursor:pointer;border-radius:3px;font-family:inherit;box-shadow:0 3px 0 #8b6914
}
.btn:hover{background:#ffe44d}
.btn:active{transform:translateY(3px);box-shadow:none}
.info{color:#888;font-size:10px;text-align:center;margin-top:10px}
.info kbd{background:#333;color:#ffd700;padding:1px 6px;border-radius:2px;border:1px solid #555;font-size:10px}
</style>
</head>
<body>
<div class="game-wrapper">
<div class="hud">
<div class="hud-l"><span style="color:#4ecdc4">STAGE <span id="sdS">1</span></span></div>
<div class="hud-r">
<span>SCORE <span id="sdC">0</span></span>
<span style="color:#ff6b6b">&#9829; <span id="sdL">3</span></span>
<span style="color:#ff9f43">ENEMIES <span id="sdE">20</span></span>
</div>
</div>
<div class="cwrap">
<canvas id="C" width="416" height="416"></canvas>
<div class="overlay" id="O">
<h1>&#9733; 坦克大战</h1>
<p>BATTLE CITY</p>
<p style="font-size:10px;color:#666">方向键 移动 | SPACE 射击 | P 暂停</p>
<button class="btn" id="startBtn">开 始 游 戏</button>
</div>
</div>
<div class="info">
<kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&rarr;</kbd> <kbd>&darr;</kbd> 移动
&nbsp; <kbd>SPACE</kbd> 射击 &nbsp; <kbd>P</kbd> 暂停
</div>
</div>
<script src="bundle.js"></script>
</body>
</html>
