<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .game-wrapper {
    background: #16213e;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(0,100,255,0.2);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #e0e0e0;
    font-size: 16px;
  }
  .game-header div { display: flex; align-items: center; gap: 10px; }
  .game-header span { color: #ffd700; font-weight: bold; font-size: 20px; min-width: 30px; }
  .game-header .label { color: #888; font-size: 14px; }
  canvas {
    display: block;
    background: #2d2d2d;
    border-radius: 8px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    image-rendering: pixelated;
  }
  .controls {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    color: #666;
    font-size: 13px;
  }
  .controls kbd {
    background: #2a2a4a;
    padding: 2px 8px;
    border-radius: 4px;
    color: #aaa;
    font-size: 12px;
    border: 1px solid #444;
  }
  #restartBtn {
    background: #e94560;
    color: white;
    border: none;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  #restartBtn:hover { background: #ff6b81; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-header">
    <div><span class="label">&#9733; 得分</span> <span id="scoreDisplay">0</span></div>
    <div><span class="label">&#9829; 生命</span> <span id="livesDisplay">3</span></div>
    <div><span class="label">&#9881; 波次</span> <span id="waveDisplay">1</span></div>
    <button id="restartBtn">重新开始</button>
  </div>
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <div class="controls">
    <span><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 移动</span>
    <span><kbd>&#9251;</kbd> 射击</span>
    <span><kbd>P</kbd> 暂停</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const livesSpan = document.getElementById('livesDisplay');
const waveSpan = document.getElementById('waveDisplay');

// --- Constants ---
const TILE = 30;
const COLS = 20;
const ROWS = 20;
const PLAYER_SPEED = 2.5;
const BULLET_SPEED = 5;
const SHOOT_COOLDOWN = 250; // ms
const MAX_ENEMIES = 6;
const SPAWN_INTERVAL = 3000; // ms

// --- Directions ---
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// --- Game State ---
let game = resetGame();
let keys = {};
let lastShotTime = 0;
let lastSpawnTime = 0;
let paused = false;
let gameOver = false;
let animFrame;

// --- Reset ---
function resetGame() {
  return {
    player: {
      x: 9 * TILE, y: 18 * TILE, w: TILE-4, h: TILE-4,
      dir: DIR.UP, speed: PLAYER_SPEED, alive: true,
      lives: 3, score: 0, invincible: 0
    },
    enemies: [],
    bullets: [],
    walls: createWalls(),
    wave: 1,
    enemiesSpawned: 0,
    enemiesPerWave: 8,
    spawnTimer: 0
  };
}

function createWalls() {
  const walls = [];
  // Border walls
  for (let i = 0; i < COLS; i++) {
    walls.push({ x: i*TILE, y: 0, w: TILE, h: TILE, type: 'steel' });
    walls.push({ x: i*TILE, y: (ROWS-1)*TILE, w: TILE, h: TILE, type: 'steel' });
  }
  for (let i = 0; i < ROWS; i++) {
    walls.push({ x: 0, y: i*TILE, w: TILE, h: TILE, type: 'steel' });
    walls.push({ x: (COLS-1)*TILE, y: i*TILE, w: TILE, h: TILE, type: 'steel' });
  }

  // Brick layout patterns
  const layout = [
    [3,3],[3,4],[3,5],[3,6],          [7,6],[8,6],[9,6],[10,6],[11,6],
    [4,4],[4,5],[4,6],
    [5,3],[6,3],[7,3],[8,3],          [6,7],[7,7],[8,7],
    [6,5],[7,5],[8,5],[9,5],[10,5],
    [5,9],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[13,9],
    [5,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],
    [2,12],[2,13],[2,14],[2,15],
    [3,13],[3,14],
    [5,12],[5,13],[5,14],[5,15],
    [7,12],[7,13],[7,14],[7,15],
    [9,12],[9,13],[9,14],[9,15],
    [11,12],[11,13],[11,14],[11,15],
    [13,12],[13,13],[13,14],[13,15],
    [15,12],[15,13],[15,14],[15,15],
    [16,3],[16,4],[16,5],[16,6],[16,7],
    [17,3],[17,4],[17,5],[17,6],[17,7],
    [4,1],[5,1],[6,1],[7,1],
    [12,1],[13,1],[14,1],[15,1],
    [4,17],[5,17],[6,17],[7,17],[8,17],[9,17],[10,17],[11,17],[12,17],[13,17],[14,17],[15,17],
  ];
  for (const [cx, cy] of layout) {
    if (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS) {
      walls.push({ x: cx*TILE, y: cy*TILE, w: TILE, h: TILE, type: 'brick' });
    }
  }
  return walls;
}

// --- Utility ---
function rand(min, max) { return Math.random() * (max-min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max+1)); }

function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function canMove(rect, excludeWalls = false) {
  // Check boundaries
  if (rect.x < 0 || rect.x + rect.w > COLS * TILE ||
      rect.y < 0 || rect.y + rect.h > ROWS * TILE) return false;
  // Check walls
  for (const w of game.walls) {
    if (excludeWalls && w.type === 'steel') continue; // for bullets
    if (rectCollide(rect, w)) {
      if (excludeWalls && w.type === 'steel') return false; // bullets can't pass steel either
      return false;
    }
  }
  return true;
}

// --- Bullet Creation ---
function fireBullet(tank, isEnemy = false) {
  const cx = tank.x + tank.w/2 - 2;
  const cy = tank.y + tank.h/2 - 2;
  const b = { x: cx, y: cy, w: 4, h: 4, dir: tank.dir, speed: BULLET_SPEED, isEnemy };
  // Push bullet forward so it doesn't collide with shooter
  b.x += DX[b.dir] * 10;
  b.y += DY[b.dir] * 10;
  return b;
}

// --- Spawn Enemy ---
function spawnEnemy() {
  if (game.enemies.length >= MAX_ENEMIES) return;
  if (game.enemiesSpawned >= game.enemiesPerWave) return;

  const spawnPoints = [
    { x: 1*TILE, y: 1*TILE },
    { x: 9*TILE, y: 1*TILE },
    { x: 17*TILE, y: 1*TILE }
  ];
  const sp = spawnPoints[randInt(0, 2)];
  // Check if spawn point is clear
  const testRect = { x: sp.x, y: sp.y, w: TILE-4, h: TILE-4 };
  for (const e of game.enemies) {
    if (rectCollide(testRect, e)) return;
  }
  if (rectCollide(testRect, game.player)) return;

  game.enemies.push({
    x: sp.x, y: sp.y, w: TILE-4, h: TILE-4,
    dir: DIR.DOWN, speed: 0.8 + game.wave * 0.1,
    alive: true, shootTimer: 0, moveTimer: 0,
    changeDirTimer: 0
  });
  game.enemiesSpawned++;
}

// --- Update ---
function update(dt) {
  if (paused || gameOver || !game.player.alive) return;

  const p = game.player;

  // Player invincibility countdown
  if (p.invincible > 0) p.invincible -= dt;

  // --- Player Movement ---
  let moveX = 0, moveY = 0;
  if (keys['w'] || keys['arrowup']) { p.dir = DIR.UP; moveY = -1; }
  else if (keys['s'] || keys['arrowdown']) { p.dir = DIR.DOWN; moveY = 1; }
  else if (keys['a'] || keys['arrowleft']) { p.dir = DIR.LEFT; moveX = -1; }
  else if (keys['d'] || keys['arrowright']) { p.dir = DIR.RIGHT; moveX = 1; }

  if (moveX !== 0 || moveY !== 0) {
    let nx = p.x + moveX * p.speed;
    let ny = p.y + moveY * p.speed;
    if (canMove({ x: nx, y: p.y, w: p.w, h: p.h })) p.x = nx;
    if (canMove({ x: p.x, y: ny, w: p.w, h: p.h })) p.y = ny;
  }

  // Player shooting
  if (keys[' '] || keys['z']) {
    const now = performance.now();
    if (now - lastShotTime > SHOOT_COOLDOWN) {
      game.bullets.push(fireBullet(p, false));
      lastShotTime = now;
    }
  }

  // --- Spawn enemies ---
  if (game.enemiesSpawned < game.enemiesPerWave) {
    game.spawnTimer -= dt * 1000;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      game.spawnTimer = SPAWN_INTERVAL;
    }
  }

  // --- Enemy AI ---
  for (const e of game.enemies) {
    e.changeDirTimer -= dt;
    e.shootTimer -= dt;

    if (e.changeDirTimer <= 0) {
      // 60% chance move toward player, 40% random
      if (Math.random() < 0.6 && game.player.alive) {
        const dx = p.x - e.x;
        const dy = p.y - e.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else {
        e.dir = randInt(0, 3);
      }
      e.changeDirTimer = 0.5 + Math.random() * 1.5;
    }

    let nx = e.x + DX[e.dir] * e.speed;
    let ny = e.y + DY[e.dir] * e.speed;
    if (canMove({ x: nx, y: e.y, w: e.w, h: e.h })) e.x = nx;
    if (canMove({ x: e.x, y: ny, w: e.w, h: e.h })) e.y = ny;

    // Enemy shooting
    if (e.shootTimer <= 0) {
      // Only shoot if roughly aligned with player
      let shouldShoot = false;
      if (game.player.alive) {
        if (e.dir === DIR.UP || e.dir === DIR.DOWN) {
          shouldShoot = Math.abs(e.x - p.x) < TILE;
        } else {
          shouldShoot = Math.abs(e.y - p.y) < TILE;
        }
      }
      if (shouldShoot || Math.random() < 0.02) {
        game.bullets.push(fireBullet(e, true));
        e.shootTimer = 1.0 + Math.random() * 1.5;
      }
    }
  }

  // --- Bullets ---
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];
    b.x += DX[b.dir] * b.speed;
    b.y += DY[b.dir] * b.speed;

    let remove = false;

    // Out of bounds
    if (b.x < 0 || b.x > COLS*TILE || b.y < 0 || b.y > ROWS*TILE) {
      remove = true;
    }

    // Hit walls
    if (!remove) {
      for (let j = game.walls.length - 1; j >= 0; j--) {
        const w = game.walls[j];
        if (rectCollide(b, w)) {
          remove = true;
          if (w.type === 'brick') {
            game.walls.splice(j, 1); // destroy brick
          }
          break;
        }
      }
    }

    // Hit tanks
    if (!remove && b.isEnemy && game.player.alive) {
      if (rectCollide(b, game.player) && game.player.invincible <= 0) {
        remove = true;
        game.player.alive = false;
        game.player.lives--;
        livesSpan.textContent = game.player.lives;
        if (game.player.lives <= 0) {
          gameOver = true;
        } else {
          // Respawn after delay
          setTimeout(() => {
            game.player.x = 9 * TILE;
            game.player.y = 18 * TILE;
            game.player.dir = DIR.UP;
            game.player.alive = true;
            game.player.invincible = 2; // 2 seconds invincibility
          }, 1000);
        }
      }
    }

    if (!remove && !b.isEnemy) {
      for (let j = game.enemies.length - 1; j >= 0; j--) {
        const e = game.enemies[j];
        if (rectCollide(b, e)) {
          remove = true;
          game.enemies.splice(j, 1);
          game.player.score += 100;
          scoreSpan.textContent = game.player.score;
          break;
        }
      }
    }

    if (remove) {
      game.bullets.splice(i, 1);
    }
  }

  // --- Wave complete? ---
  if (game.enemies.length === 0 && game.enemiesSpawned >= game.enemiesPerWave) {
    game.wave++;
    waveSpan.textContent = game.wave;
    game.enemiesSpawned = 0;
    game.enemiesPerWave = Math.min(game.enemiesPerWave + 2, 20);
    game.spawnTimer = 1000; // brief pause before next wave
  }
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*TILE, 0); ctx.lineTo(i*TILE, ROWS*TILE); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i*TILE); ctx.lineTo(COLS*TILE, i*TILE); ctx.stroke();
  }

  // Walls
  for (const w of game.walls) {
    if (w.type === 'steel') {
      ctx.fillStyle = '#888';
      ctx.fillRect(w.x, w.y, w.w, w.h);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(w.x+2, w.y+2, w.w-4, w.h-4);
      ctx.fillStyle = '#666';
      ctx.fillRect(w.x+4, w.y+4, w.w-8, w.h-8);
    } else {
      ctx.fillStyle = '#c97b3a';
      ctx.fillRect(w.x, w.y, w.w, w.h);
      ctx.fillStyle = '#b06a2e';
      ctx.fillRect(w.x+1, w.y+1, (w.w/2)-1, (w.h/2)-1);
      ctx.fillRect(w.x+w.w/2, w.y+w.h/2, (w.w/2)-2, (w.h/2)-2);
      ctx.fillStyle = '#d48c4a';
      ctx.fillRect(w.x+w.w/2, w.y+1, (w.w/2)-2, (w.h/2)-2);
      ctx.fillRect(w.x+1, w.y+w.h/2, (w.w/2)-1, (w.h/2)-1);
    }
  }

  // Player
  if (game.player.alive || (!game.player.alive && Math.floor(performance.now()/200) % 2 === 0)) {
    drawTank(game.player, game.player.invincible > 0);
  }

  // Enemies
  for (const e of game.enemies) {
    drawTank(e, false, true);
  }

  // Bullets
  for (const b of game.bullets) {
    ctx.fillStyle = b.isEnemy ? '#ff4444' : '#ffd700';
    ctx.shadowColor = b.isEnemy ? '#ff4444' : '#ffd700';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  }

  // Overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', canvas.width/2, canvas.height/2);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = '#aaa';
    ctx.font = '20px sans-serif';
    ctx.fillText('最终得分: ' + game.player.score, canvas.width/2, canvas.height/2 + 40);
    ctx.fillStyle = '#888';
    ctx.font = '16px sans-serif';
    ctx.fillText('按 "重新开始" 再来一局', canvas.width/2, canvas.height/2 + 80);
  }

  // Wave complete message briefly
  if (game.enemies.length === 0 && game.enemiesSpawned >= game.enemiesPerWave && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(canvas.width/2-120, canvas.height/2-30, 240, 60);
    ctx.fillStyle = '#4ade80';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('第 ' + game.wave + ' 波', canvas.width/2, canvas.height/2 + 10);
  }
}

function drawTank(tank, invincible = false, isEnemy = false) {
  const { x, y, w, h, dir } = tank;
  const cx = x + w/2;
  const cy = y + h/2;

  ctx.save();

  if (invincible && Math.floor(performance.now()/100) % 2 === 0) {
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
  }

  // Tank body
  const bodyColor = isEnemy ? '#c0392b' : '#2ecc71';
  const bodyColorDark = isEnemy ? '#96281b' : '#27ae60';
  const bodyColorLight = isEnemy ? '#e74c3c' : '#58d68d';

  ctx.fillStyle = bodyColor;
  ctx.fillRect(x, y, w, h);

  // Treads
  ctx.fillStyle = bodyColorDark;
  ctx.fillRect(x, y, 5, h);
  ctx.fillRect(x+w-5, y, 5, h);
  // Tread details
  ctx.fillStyle = bodyColorLight;
  for (let i = 0; i < h; i += 6) {
    ctx.fillRect(x+1, y+i, 3, 3);
    ctx.fillRect(x+w-4, y+i, 3, 3);
  }

  // Turret circle
  ctx.fillStyle = isEnemy ? '#a93226' : '#1e8449';
  ctx.beginPath();
  ctx.arc(cx, cy, w/4, 0, Math.PI * 2);
  ctx.fill();

  // Barrel
  ctx.strokeStyle = isEnemy ? '#7b241c' : '#145a32';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + DX[dir] * w/2, cy + DY[dir] * w/2);
  ctx.stroke();

  ctx.restore();
}

// --- Game Loop ---
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// --- Input ---
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'p' || e.key === 'P') paused = !paused;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// --- Restart ---
document.getElementById('restartBtn').addEventListener('click', () => {
  game = resetGame();
  gameOver = false;
  paused = false;
  lastShotTime = 0;
  game.spawnTimer = 1000;
  scoreSpan.textContent = '0';
  livesSpan.textContent = '3';
  waveSpan.textContent = '1';
});

// --- Start ---
game.spawnTimer = 1000;
animFrame = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
