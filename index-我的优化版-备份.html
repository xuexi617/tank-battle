<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>坦克大战 - Battle City</title><style>
  :root{
    --gold:#ffd24a; --gold-d:#ffb300; --red:#ff6b6b; --teal:#4ecdc4;
    --orange:#ff9f43; --panel:#14172b; --panel2:#1c2040; --ink:#eef0ff; --muted:#8a90b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;user-select:none}
  html,body{height:100%}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(1100px 700px at 12% -10%, #2a2f63 0%, transparent 55%),
      radial-gradient(900px 600px at 100% 110%, #3a1f4d 0%, transparent 50%),
      linear-gradient(160deg,#0c0d1c 0%, #11132a 60%, #080812 100%);
    font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    color:var(--ink); padding:28px;
  }
  body::after{ /* 缓慢漂移的背景光晕 */
    content:""; position:fixed; inset:-20%; z-index:-1; pointer-events:none;
    background:
      radial-gradient(circle at 30% 30%, rgba(78,205,196,.07), transparent 42%),
      radial-gradient(circle at 72% 68%, rgba(255,210,74,.06), transparent 42%);
    animation:drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift{ from{transform:translate(-2%,-1%)} to{transform:translate(2%,2%)} }
  /* 机柜外框 */
  .frame{
    width:min(94vmin,780px);
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    padding:26px 28px 22px;
    border-radius:26px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(255,200,0,.06), inset 0 1px 0 rgba(255,255,255,.06);
    position:relative; overflow:hidden;
  }
  .frame::before{ content:""; position:absolute; inset:0 0 auto; height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.7; }
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px}
  .brand h1{
    font-size:34px;letter-spacing:6px;line-height:1;
    background:linear-gradient(180deg,#fff3c4,var(--gold) 60%,var(--gold-d));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 26px rgba(255,200,0,.35);
  }
  .brand p{font-size:12px;letter-spacing:8px;color:var(--muted);margin-top:6px}
  .best{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,210,74,.10);border:1px solid rgba(255,210,74,.35);
    padding:8px 14px;border-radius:12px;font-weight:700;
  }
  .best .lab{font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:600}
  .best .v{font-size:20px;color:var(--gold);font-variant-numeric:tabular-nums}
  .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
  .stat{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
    border-radius:14px;padding:10px 6px;position:relative;overflow:hidden;
  }
  .stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,var(--gold))}
  .stat .ic{font-size:16px;filter:drop-shadow(0 0 6px var(--c))}
  .stat .label{font-size:11px;color:var(--muted);letter-spacing:2px}
  .stat .val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--c,var(--ink))}
  .stat.s{--c:var(--gold)} .stat.st{--c:var(--teal)} .stat.l{--c:var(--red)} .stat.e{--c:var(--orange)}
  .enemybar{height:8px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:14px;border:1px solid rgba(255,255,255,.05)}
  .enemyfill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,var(--orange),#ffd24a);transition:width .25s ease;box-shadow:0 0 12px rgba(255,159,67,.5)}
  .cwrap{position:relative;line-height:0;border-radius:14px;padding:6px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.06)}
  canvas{
    display:block;width:100%;height:auto;aspect-ratio:1/1;
    background:#13261a;border-radius:10px;
    box-shadow:inset 0 0 60px rgba(0,0,0,.7), 0 0 24px rgba(78,205,196,.08);
    image-rendering:pixelated;
  }
  .overlay{
    position:absolute;inset:6px;z-index:10;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;
    background:rgba(8,9,18,.84);backdrop-filter:blur(4px);border-radius:10px;padding:24px;
  }
  .overlay h1{color:var(--gold);font-size:38px;letter-spacing:6px;text-shadow:0 0 20px rgba(255,200,0,.45)}
  .overlay p{color:#c7ccec;font-size:14px;letter-spacing:1px}
  .overlay .small{color:#7e84a8;font-size:12px;line-height:1.9}
  .btn{
    background:linear-gradient(180deg,#ffe14d,var(--gold-d));color:#2a2100;border:none;
    padding:13px 40px;font-size:16px;font-weight:800;letter-spacing:3px;cursor:pointer;
    border-radius:10px;box-shadow:0 5px 0 #9a7400,0 10px 22px rgba(255,196,0,.32);
    transition:transform .05s,box-shadow .05s,filter .15s;font-family:inherit;
  }
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(5px);box-shadow:0 0 0 #9a7400}
  .bottombar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px;flex-wrap:wrap}
  .keys{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .keys span{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}
  kbd{background:#262a47;color:#dfe3ff;padding:4px 10px;border-radius:7px;border:1px solid #3a3f63;font-size:12px;font-family:inherit;box-shadow:0 2px 0 #14162b;min-width:26px;text-align:center}
  #restartBtn{background:linear-gradient(180deg,#ff7a90,#e94560);color:#fff;border:none;padding:9px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;box-shadow:0 4px 0 #a82a3f;transition:transform .05s,box-shadow .05s,filter .15s}
  #restartBtn:hover{filter:brightness(1.06)}
  #restartBtn:active{transform:translateY(4px);box-shadow:none}
  .hint{font-size:11px;color:#666c92;letter-spacing:1px;text-align:center;margin-top:12px;line-height:1.7}
  /* 触屏控制 */
  .touch{position:absolute;inset:6px;z-index:14;display:none;justify-content:space-between;align-items:flex-end;padding:16px;pointer-events:none}
  .touch.show{display:flex}
  @media (pointer:coarse){ .touch{display:flex} }
  .pad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:6px;pointer-events:auto}
  .tb{background:rgba(78,205,196,.16);border:1px solid rgba(78,205,196,.5);color:#dffaf5;font-size:20px;border-radius:12px;touch-action:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .tb:active{background:rgba(78,205,196,.4)}
  .tb.blank{visibility:hidden}
  .tb.up{grid-column:2;grid-row:1} .tb.left{grid-column:1;grid-row:2}
  .tb.right{grid-column:3;grid-row:2} .tb.down{grid-column:2;grid-row:3} .tb.blank{grid-column:2;grid-row:2}
  .fire{width:84px;height:84px;border-radius:50%;background:linear-gradient(180deg,#ff7a90,#e94560);color:#fff;border:2px solid rgba(255,255,255,.3);font-size:14px;font-weight:800;letter-spacing:1px;touch-action:none;cursor:pointer;pointer-events:auto;box-shadow:0 5px 0 #a82a3f}
  .fire:active{transform:translateY(3px);box-shadow:0 2px 0 #a82a3f}
  @media (max-width:520px){ .brand h1{font-size:26px} .stat .val{font-size:20px} .keys{gap:10px} }
</style></head><body>
  <div class=frame>
    <div class=topbar>
      <div class=brand><h1>&#9733; 坦克大战</h1><p>BATTLE CITY</p></div>

    </div>

    <div class=hint>保护底部基地（老鹰），消灭全部敌军即可进入下一关 · 进度会自动记录最高分 · 手机可用屏幕方向键与 FIRE 按钮</div>
  </div>
<script>
(function(){
'use strict';
const C=document.getElementById('C');
const VIEW=680, SCALE=VIEW/416;          // 内部分辨率 416，放大显示，像素更清晰
C.width=VIEW; C.height=VIEW;
const X=C.getContext('2d'); X.imageSmoothingEnabled=false;
const $=i=>document.getElementById(i),O=$('O'),SB=$('startBtn');
const sS=$('sdS'),sC=$('sdC'),sL=$('sdL'),sE=$('sdE'),sH=$('sdH'),enemyFill=$('enemyFill');
const T=16,CO=26,RO=26,W=416,H=416,PS=1.5,BS=3,U=0,R=1,D=2,L=3;
let G={};
let HS=0; try{HS=+(localStorage.getItem('tankBattleHS')||0)||0;}catch(e){}

/* ---------- 音效：Web Audio 合成，无需任何外部音频文件 ---------- */
let actx=null;
function audio(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}} return actx; }
function beep(freq,dur,type,vol){ const a=audio(); if(!a) return; const o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.value=freq; o.connect(g); g.connect(a.destination); const t=a.currentTime; g.gain.setValueAtTime(vol||0.05,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02); }
const sfx={ shoot:()=>beep(880,0.06,'square',0.05), hit:()=>beep(220,0.08,'sawtooth',0.07),
  explode:()=>{beep(120,0.18,'sawtooth',0.09);setTimeout(()=>beep(80,0.22,'square',0.07),60);},
  brick:()=>beep(440,0.04,'square',0.04), steel:()=>beep(1200,0.03,'square',0.04),
  gameover:()=>{beep(330,0.2,'sawtooth',0.08);setTimeout(()=>beep(220,0.3,'sawtooth',0.08),180);},
  win:()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.07),i*120));},
  start:()=>{[392,523,659].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.07),i*90));} };

/* ---------- 触屏输入状态 ---------- */
const touch={U:false,D:false,L:false,R:false,fire:false};

function iS(){return{st:1,sc:0,lv:3,go:false,pa:false,ru:false,tl:20,sp:0,ki:0,stm:0,mx:4,pl:null,en:[],bu:[],ti:[],fx:[],fr:0,ke:{},ba:true,
  shk:0, mz:0, mzx:0, mzy:0, pop:[] }}
function rng(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}

// FIX 2: 中间出生点加入清空列表 ([0,12])
function mkMp(s){let m=Array.from({length:RO},()=>Array(CO).fill(0));let r=rng(s*9999+42);for(let x=0;x<CO;x++){m[0][x]=2;if(x<11||x>14)m[RO-1][x]=2}for(let y=0;y<RO;y++){m[y][0]=2;m[y][CO-1]=2}m[RO-1][12]=3;m[RO-1][13]=3;m[RO-2][12]=3;m[RO-2][13]=3;for(let y=2;y<RO-3;y++)for(let x=1;x<CO-1;x++){if(y>=RO-4&&x>=11&&x<=14)continue;if(y<3&&(x<4||x>CO-5))continue;if(y>=RO-5&&(x<4||x>CO-5))continue;if(r()<.35)m[y][x]=1;}[ [0,0],[0,12],[0,CO-3],[RO-3,0],[RO-3,CO-3] ].forEach(([sy,sx])=>{for(let dy=0;dy<3;dy++)for(let dx=0;dx<3;dx++)m[sy+dy][sx+dx]=0;});for(let dy=0;dy<3;dy++)for(let dx=0;dx<4;dx++)m[RO-4+dy][8+dx]=0; if(s>=3)for(let i=0;i<2+s;i++){let y=3+Math.floor(r()*(RO-8)),x=3+Math.floor(r()*(CO-6));m[y][x]=2;}return m;}

// FIX 1: makeTankSprite 始终画炮管朝上, 缓存仅按 tp
const _cache = {};
function makeTankSprite(tp){const key=`${tp}`; if(_cache[key])return _cache[key]; const cvs=document.createElement('canvas'); cvs.width=16; cvs.height=16; const g=cvs.getContext('2d'); g.imageSmoothingEnabled=false;
 if(tp===2){g.fillStyle='#7f8c8d'; g.fillRect(1,3,14,10); g.fillStyle='#4a5555'; g.fillRect(0,2,3,12); g.fillRect(13,2,3,12);} else if(tp===1){g.fillStyle='#e67e22'; g.fillRect(1,3,14,10); g.fillStyle='#a8590a'; g.fillRect(0,2,3,12); g.fillRect(13,2,3,12);} else {g.fillStyle='#c0392b'; g.fillRect(1,3,14,10); g.fillStyle='#7a1f1a'; g.fillRect(0,2,3,12); g.fillRect(13,2,3,12);}
 g.fillStyle='#fff'; g.fillRect(7,6,2,4);
 g.fillStyle='#222'; g.fillRect(7,0,2,5); // muzzle always up
 _cache[key]=cvs; return cvs; }
function drawTank(x,y,dir,tp,flash){
 if(flash&& (G.fr>>2)%2===0){ X.fillStyle='rgba(255,255,255,.12)'; X.fillRect(x,y,16,16);} const sprite = makeTankSprite(tp); if(!sprite)return;
 if(dir===0){ X.drawImage(sprite,x,y); } else if(dir===1){
  X.save(); X.translate(x+8,y+8); X.rotate(Math.PI/2); X.drawImage(sprite,-8,-8); X.restore();
 } else if(dir===2){ X.save(); X.translate(x+8,y+8); X.rotate(Math.PI); X.drawImage(sprite,-8,-8); X.restore(); }
 else { X.save(); X.translate(x+8,y+8); X.rotate(-Math.PI/2); X.drawImage(sprite,-8,-8); X.restore(); }
}

function drT(x,y,t){ if(t===1){X.fillStyle='#b35e30';X.fillRect(x,y,T,T);X.fillStyle='#7a3e1e';X.fillRect(x+7,y,1,T);X.fillRect(x,y+7,T,1);X.fillStyle='#d4733e';X.fillRect(x+1,y+1,5,5);X.fillRect(x+9,y+1,5,5);X.fillRect(x+1,y+9,5,5);X.fillRect(x+9,y+9,5,5);}else if(t===2){X.fillStyle='#8a8a8a';X.fillRect(x,y,T,T);X.fillStyle='#555';X.fillRect(x+2,y+2,5,5);X.fillRect(x+9,y+2,5,5);X.fillRect(x+2,y+9,5,5);X.fillRect(x+9,y+9,5,5);X.fillStyle='#bbb';X.fillRect(x+4,y+4,2,2);X.fillRect(x+11,y+4,2,2);X.fillRect(x+4,y+11,2,2);X.fillRect(x+11,y+11,2,2);X.fillStyle='rgba(255,255,255,.2)';X.fillRect(x+3,y+3,10,10);X.fillStyle='#555';X.fillRect(x+7,y,1,T);X.fillRect(x,y+7,T,1);}else if(t===3){X.fillStyle='#444';X.fillRect(x+2,y+6,12,8);X.fillRect(x+4,y+4,8,2);X.fillStyle='#e74c3c';X.fillRect(x+5,y,6,5);X.fillStyle='#f1c40f';X.fillRect(x+6,y+1,4,3);X.fillStyle='#f39c12';X.fillRect(x+4,y+8,8,4);X.fillStyle='#fff';X.fillRect(x+4,y+7,2,2);X.fillRect(x+10,y+7,2,2);X.fillStyle='#222';X.fillRect(x+5,y+8,1,1);X.fillRect(x+11,y+8,1,1);} }

function drPl(x,y,d,fl){ drawTank(x,y,d,0,fl); }
function drEn(x,y,d,tp,sf,hp,mh){ if(sf>0){X.fillStyle=sf%8<4?'#fff':'#ffd700';X.fillRect(x,y,16,16);return} drawTank(x,y,d,tp,false); if(mh>1){X.fillStyle='#111';X.fillRect(x+2,y-3,12,3);X.fillStyle='#2ecc71';X.fillRect(x+3,y-2,(hp/mh)*10,1)} }

function col(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function canM(nx,ny,self){ if(nx<0||nx+16>W||ny<0||ny+16>H)return false; for(const t of G.ti)if(t.a&&nx<t.x+T&&nx+16>t.x&&ny<t.y+T&&ny+16>t.y)return false; for(const e of G.en)if(e!==self&&e.a) if(nx<e.x+16&&nx+16>e.x&&ny<e.y+16&&ny+16>e.y)return false; if(G.pl&&G.pl.a&&G.pl!==self) if(nx<G.pl.x+16&&nx+16>G.pl.x&&ny<G.pl.y+16&&ny+16>G.pl.y)return false; return true; }

// FIX 5: mTank 先试对齐位置, 不行再试原始位
function mTank(t,dir){
 t.d=dir;let nx=t.x,ny=t.y;
 if(dir===U)ny-=t.sp;else if(dir===D)ny+=t.sp; else if(dir===L)nx-=t.sp;else nx+=t.sp;
 if(dir===U||dir===D)nx=Math.round(nx/2)*2;else ny=Math.round(ny/2)*2;
 let snx=nx,sny=ny;
 if(dir===U||dir===D){let a=Math.abs(nx%16);if(a<3)snx=Math.floor(nx/16)*16;else if(a>13)snx=Math.ceil(nx/16)*16}
 else{let a=Math.abs(ny%16);if(a<3)sny=Math.floor(ny/16)*16;else if(a>13)sny=Math.ceil(ny/16)*16}
 if(canM(snx,sny,t)){t.x=snx;t.y=sny}
 else if(canM(nx,ny,t)){t.x=nx;t.y=ny}
}

function fx(x,y,n,c1,c2){ for(let i=0;i<n;i++){let a=Math.random()*6.28,s=.5+Math.random()*2.5; G.fx.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,lt:15+30*Math.random(),ml:40,sz:2+Math.floor(Math.random()*4),cl:Math.random()>.5?c1:c2})} G.fx.push({x,y,r:n*1.8,lt:12,ml:12,bo:true}) }
function uFX(){ for(let i=G.fx.length-1;i>=0;i--){let p=G.fx[i]; if(p.bo){if(--p.lt<=0)G.fx.splice(i,1);continue} p.x+=p.vx;p.y+=p.vy;p.vy+=.03;if(--p.lt<=0)G.fx.splice(i,1)} }
function dFX(){ for(const p of G.fx){ if(p.bo){let a=p.lt/p.ml; X.globalAlpha=a*.35;X.fillStyle='#ffd700';X.beginPath();X.arc(p.x,p.y,p.r*(1-a*.5),0,6.28);X.fill(); X.fillStyle='#fff';X.beginPath();X.arc(p.x,p.y,p.r*(1-a)*.3,0,6.28);X.fill(); X.globalAlpha=1 } else {X.globalAlpha=p.lt/p.ml;X.fillStyle=p.cl;X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz)}} X.globalAlpha=1 }
const SPW=[{x:16,y:16},{x:192,y:16},{x:368,y:16}];
function spE(){ let pl=[...SPW].sort(()=>Math.random()-.5); for(const p of pl){ let b=false; for(const e of G.en)if(e.a&&Math.abs(e.x-p.x)<24&&Math.abs(e.y-p.y)<24){b=true;break} if(G.pl&&G.pl.a&&Math.abs(G.pl.x-p.x)<24&&Math.abs(G.pl.y-p.y)<24)b=true; if(b)continue; let t=Math.random()<.15?2:Math.random()<.4?1:0; G.en.push({x:p.x,y:p.y,w:16,h:16,d:D,sp:t===1?.95:t===0?.6:.45,hp:t===2?3:1,mh:t===2?3:1,a:true,tp:t,cd:0,sf:45,dc:0,st:40+60*Math.random()}); G.sp++;uH();return }}
function uH(){sC.textContent=G.sc;sS.textContent=G.st;sL.textContent=G.lv;sE.textContent=Math.max(0,G.tl-G.ki);
  if(G.sc>HS){HS=G.sc;try{localStorage.setItem('tankBattleHS',HS)}catch(e){}}
  sH.textContent=HS;
  let remain=Math.max(0,G.tl-G.ki); let pct=G.tl>0?Math.max(0,Math.min(100,remain/G.tl*100)):0; enemyFill.style.width=pct+'%';
}
function eG(){G.go=true;G.ru=false;O.style.display='flex';O.innerHTML='<h1>GAME OVER</h1><p>得分: '+G.sc+' &nbsp;·&nbsp; 最高分: '+HS+'</p><p>关卡: '+G.st+'</p><button class="btn" id="rb">重新开始</button>';$('rb').onclick=()=>{O.style.display='none';sG()}; sfx.gameover();}
function nS(){G.st++;G.ru=false;O.style.display='flex';O.innerHTML='<h1>STAGE '+G.st+'</h1><p>准备下一关!</p><button class="btn" id="nb">继续</button>';$('nb').onclick=()=>{O.style.display='none';sSt(G.st)}; sfx.win();}
function sG(){G=iS();sSt(1)}
function sSt(s){G.st=s;G.tl=20+(s-1)*5;G.sp=0;G.ki=0;G.ru=true;G.ba=true;G.en=[];G.bu=[];G.ti=[];G.fx=[];G.stm=0;let m=mkMp(s);for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)if(m[r][c]>=1&&m[r][c]<=3)G.ti.push({x:c*T,y:r*T,w:T,h:T,tp:m[r][c],a:true});G.pl={x:8*T,y:(RO-3)*T,w:16,h:16,d:U,sp:PS,hp:1,a:true,cd:0,iv:120,rs:0};uH();O.style.display='none';}

document.addEventListener('keydown',e=>{ G.ke[e.code]=true; if(e.code==='KeyP'){G.pa=!G.pa; const po=document.getElementById('pauseO'); if(po)po.style.display=G.pa?'flex':'none';} if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault(); });
document.addEventListener('keyup',e=>{ G.ke[e.code]=false; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault(); });

// 触屏控制绑定（桌面环境无相关元素时静默跳过）
try{
  const te=document.getElementById('touch');
  if(te){
    if(('ontouchstart' in window) || (window.navigator && window.navigator.maxTouchPoints>0)) te.classList.add('show');
    te.querySelectorAll('[data-dir]').forEach(b=>{
      const d=b.getAttribute('data-dir');
      const on=e=>{e.preventDefault();touch[d]=true;}, off=e=>{e.preventDefault();touch[d]=false;};
      b.addEventListener('touchstart',on); b.addEventListener('touchend',off); b.addEventListener('touchcancel',off);
      b.addEventListener('mousedown',on); b.addEventListener('mouseup',off); b.addEventListener('mouseleave',off);
    });
    const fb=document.getElementById('fireBtn');
    if(fb){ const on=e=>{e.preventDefault();touch.fire=true;}, off=e=>{e.preventDefault();touch.fire=false;};
      fb.addEventListener('touchstart',on); fb.addEventListener('touchend',off); fb.addEventListener('touchcancel',off);
      fb.addEventListener('mousedown',on); fb.addEventListener('mouseup',off); fb.addEventListener('mouseleave',off); }
  }
  const po=document.getElementById('pauseO');
  if(po){ $('resumeBtn').onclick=()=>{G.pa=false;po.style.display='none';}; $('prestartBtn').onclick=()=>{G.pa=false;po.style.display='none';O.style.display='none';sG();}; }
}catch(e){}

function up(){ if(!G.ru||G.go||G.pa)return; G.fr++;
 const kU=G.ke['ArrowUp']||G.ke['KeyW'], kD=G.ke['ArrowDown']||G.ke['KeyS'], kL=G.ke['ArrowLeft']||G.ke['KeyA'], kR=G.ke['ArrowRight']||G.ke['KeyD'];
 if(G.pl&&G.pl.a){ if(G.pl.iv>0)G.pl.iv--; if(G.pl.cd>0)G.pl.cd--; if(kU||touch.U)mTank(G.pl,U); else if(kD||touch.D)mTank(G.pl,D); else if(kL||touch.L)mTank(G.pl,L); else if(kR||touch.R)mTank(G.pl,R); if(G.ke['Space']||G.ke['KeyJ']||touch.fire){ if(G.pl.cd<=0){ G.pl.cd=12; let bx=G.pl.x+6,by=G.pl.y+6; if(G.pl.d===U){bx=G.pl.x+6;by=G.pl.y-4}else if(G.pl.d===R){bx=G.pl.x+16;by=G.pl.y+6} else if(G.pl.d===D){bx=G.pl.x+6;by=G.pl.y+16}else{bx=G.pl.x-4;by=G.pl.y+6} G.bu.push({x:bx,y:by,w:4,h:4,d:G.pl.d,ok:true,a:true}); G.mz=5;G.mzx=bx+2;G.mzy=by+2; sfx.shoot(); } } }
 else if(G.pl&&!G.pl.a&&G.pl.rs>0){ if(--G.pl.rs<=0&&G.lv>0){ G.pl.x=8*T;G.pl.y=(RO-3)*T;G.pl.d=U;G.pl.a=true;G.pl.hp=1;G.pl.iv=120;G.pl.cd=0; fx(G.pl.x+8,G.pl.y+8,8,'#4ecdc4','#fff'); } }
 if(G.sp<G.tl&&G.en.filter(e=>e.a).length<G.mx&&--G.stm<=0){spE();G.stm=90}
 for(const e of G.en){ if(e.sf>0){e.sf--;continue} if(!e.a)continue; if(e.cd>0)e.cd--; e.dc--; if(e.dc<=0){ if(G.pl&&G.pl.a){ let dx=G.pl.x-e.x,dy=G.pl.y-e.y; if(Math.random()<.35)e.d=Math.abs(dy)>Math.abs(dx)?(dy>0?D:U):(dx>0?R:L); else if(Math.random()<.5)e.d=Math.floor(Math.random()*4); }else e.d=Math.floor(Math.random()*4); e.dc=40+Math.floor(Math.random()*80); } mTank(e,e.d); e.st--; if(e.st<=0){ e.st=60+Math.floor(Math.random()*90); if(e.cd<=0){ e.cd=35; let bx=e.x+6,by=e.y+6; if(e.d===U){bx=e.x+6;by=e.y-4}else if(e.d===R){bx=e.x+16,by=e.y+6} else if(e.d===D){bx=e.x+6,by=e.y+16}else{bx=e.x-4;by=e.y+6} G.bu.push({x:bx,y:by,w:4,h:4,d:e.d,ok:false,a:true}); } } }
 // FIX 4: 钢墙(tp===2)不再被子弹摧毁
 for(const b of G.bu){ if(!b.a)continue; if(b.d===R)b.x+=BS;else if(b.d===L)b.x-=BS;else if(b.d===U)b.y-=BS;else b.y+=BS; if(b.x<-4||b.x>W+4||b.y<-4||b.y>H+4){b.a=false;continue} let hit=false; for(const t of G.ti)if(t.a&&col(b,t)){ if(t.tp===1){t.a=false;fx(t.x+8,t.y+8,6,'#b35e30','#ffcc00');sfx.brick();} else if(t.tp===3){t.a=false;G.ba=false;fx(t.x+8,t.y+8,20,'#e74c3c','#f1c40f');} else { sfx.steel(); } b.a=false;hit=true;break } if(hit)continue; if(b.ok)for(const e of G.en)if(e.a&&col(b,e)){ e.hp--; if(e.hp<=0){ e.a=false; fx(e.x+8,e.y+8,12,'#ff8800','#ffdd00') } b.a=false; break } if(!b.ok&&G.pl&&G.pl.a&&col(b,G.pl)){ if(G.pl.iv<=0){ G.pl.a=false;G.lv--;uH(); fx(G.pl.x+8,G.pl.y+8,15,'#ffd700','#fff'); sfx.hit(); G.shk=Math.max(G.shk,8); if(G.lv<=0)eG();else G.pl.rs=90; } b.a=false; } }
 G.bu=G.bu.filter(b=>b.a);
 for(let i=G.en.length-1;i>=0;i--){let e=G.en[i];if(e.a||e.sf>0)continue; const gain=[100,200,300][e.tp]||100; G.ki++;G.sc+=gain; G.en.splice(i,1); G.pop.push({x:e.x+8,y:e.y+8,txt:'+'+gain,lt:42,mh:42}); G.shk=Math.max(G.shk,5); sfx.explode(); uH(); } uFX(); if(G.ki>=G.tl&&G.en.filter(e=>e.a).length===0){nS();return} if(!G.ba)eG(); }

function dr(){
 X.fillStyle='#13261a'; X.fillRect(0,0,W,H);
 X.strokeStyle='rgba(255,255,255,.04)'; X.lineWidth=1;
 for(let i=0;i<=CO;i++){X.beginPath();X.moveTo(i*T,0);X.lineTo(i*T,H);X.stroke();}
 for(let i=0;i<=RO;i++){X.beginPath();X.moveTo(0,i*T);X.lineTo(W,i*T);X.stroke();}
 for(const t of G.ti)if(t.a)drT(t.x,t.y,t.tp);
 if(G.pl&&G.pl.a)drPl(G.pl.x,G.pl.y,G.pl.d,G.pl.iv>0);
 for(const e of G.en)if(e.a||e.sf>0)drEn(e.x,e.y,e.d,e.tp,e.sf,e.hp,e.mh);
 X.shadowColor='rgba(255,224,102,.7)'; X.shadowBlur=6;
 for(const b of G.bu)if(b.a){ X.fillStyle=b.ok?'#ffe066':'#ff6b6b'; X.fillRect(b.x,b.y,4,4); X.fillStyle='rgba(255,255,255,.85)'; X.fillRect(b.x+1,b.y+1,2,2);}
 X.shadowBlur=0;
 if(G.mz>0){ X.fillStyle='rgba(255,240,180,.9)'; X.beginPath(); X.arc(G.mzx,G.mzy,5,0,6.28); X.fill(); }
 dFX();
 for(const p of G.pop){ const a=Math.min(1,p.lt/p.mh); X.globalAlpha=a; X.fillStyle='#ffe066'; X.font='bold 13px sans-serif'; X.textAlign='center'; X.fillText(p.txt,p.x,p.y-(42-p.lt)*0.4); X.textAlign='left'; X.globalAlpha=1; }
 X.strokeStyle='rgba(255,200,0,.10)'; X.lineWidth=2; X.strokeRect(0,0,W,H);
}

function loop(){
 let ox=0,oy=0; if(G.shk>0){ox=(Math.random()*2-1)*G.shk; oy=(Math.random()*2-1)*G.shk;}
 X.setTransform(SCALE,0,0,SCALE, ox*SCALE, oy*SCALE);
 up(); dr();
 if(G.shk>0)G.shk--; if(G.mz>0)G.mz--;
 for(const p of G.pop)p.lt--; if(G.pop.length)G.pop=G.pop.filter(p=>p.lt>0);
 requestAnimationFrame(loop);
}
SB.onclick=()=>{ O.style.display='none'; sfx.start(); sG(); };
$('restartBtn').onclick=()=>{ O.style.display='none'; sfx.start(); sG(); };
G=iS(); // 初始化游戏状态,避免首帧 dr() 遍历 undefined 的 G.ti 报错导致循环崩溃
loop();
})();
